version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flowerwms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: flowerwms
      MYSQL_USER: wms
      MYSQL_PASSWORD: wms1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowerwms-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/flowerwms?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: wms
      SPRING_DATASOURCE_PASSWORD: wms1234
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./flowerwms-front
      dockerfile: Dockerfile
    container_name: flowerwms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: