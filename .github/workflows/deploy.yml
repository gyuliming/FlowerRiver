name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Backend 이미지 빌드 & 푸시
        run: |
          docker build -t gyuliming/flowerwms-backend:latest .
          docker push gyuliming/flowerwms-backend:latest

      - name: Frontend 이미지 빌드 & 푸시
        run: |
          docker build -t gyuliming/flowerwms-frontend:latest ./flowerwms-front
          docker push gyuliming/flowerwms-frontend:latest

      - name: EC2 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull gyuliming/flowerwms-backend:latest
            docker pull gyuliming/flowerwms-frontend:latest
            docker stop backend frontend || true
            docker rm backend frontend || true
            docker run -d --name backend --network flowerwms-network \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/flowerwms \
              -e SPRING_DATASOURCE_USERNAME=wms \
              -e SPRING_DATASOURCE_PASSWORD=wms1234 \
              -e JWT_SECRET=flowerwms-secret-key-must-be-at-least-256-bits-long-for-hs256 \
              -e JWT_EXPIRATION=86400000 \
              -p 8080:8080 gyuliming/flowerwms-backend:latest
            docker run -d --name frontend --network flowerwms-network \
              -p 80:80 gyuliming/flowerwms-frontend:latest